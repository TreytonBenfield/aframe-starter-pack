<!DOCTYPE html>
<html>
  <head>
    <title>Textures - A-Frame School</title>
    <meta name="description" content="Textures - A-Frame School">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="fence" src="Assets/Fence_GameReady.obj"></a-asset-item>
        <a-asset-item id="hut" src="Assets/ForestHut_GameReady.obj"></a-asset-item>
        <img id="background" src="Assets/49767072781_36d1dd0324_c.jpg">
        <img id="selfie" src="Assets/B26FF4A7-0C17-4848-A810-21667A7588B3_1_105_c.jpeg">
        <img id="tex5" src="assets/texture5.jpg">
        <img id="tex3" src="assets/texture3.jpg">
        <img id="tex1" src="assets/texture1.jpg">
      </a-assets>

      

      
      <a-obj-model src="#fence" position="0 0 -4" scale="1 1 1" color="brown"></a-obj-model>
      
      <a-obj-model src="#hut" position="0 0 -6" scale="1 1 1" color="green"></a-obj-model>
  
      <a-sky src="#background"></a-sky>
      <a-plane src="#tex1" rotation="-90 0 0" height="100" width="100"></a-plane>

      <a-light type="ambient" color="#445451"></a-light>
      <a-light light="color: #ff6000; intensity: 2; type: point"></a-light>
    
    </a-scene>
  </body>
</html>
