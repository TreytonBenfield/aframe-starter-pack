<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <img id="beachball" src="Assets/Beach_Ball.jpg">
        <img id="popsiclestick" src="Assets/Popsicle stick.webp">
        <img id="popsicle" src="Assets/Popsicle.jpeg">
        <img id="background" src="Assets/background.jpg">
      </a-assets>



     <a-box position="-1 0.5 -3"
       src="#popsiclestick"
       height="2"
       width="0.2"
       depth="0.2"
       color="#C68642">
      </a-box>
      <a-box position="-1 2 -3"
       src="#popsicle"
       height="1.5"
       width="1"
       depth="0.5"
       color="#FF6F61">
      </a-box>
      <a-sphere src="#beachball" position="0 1.25 -5" radius="1.25"></a-sphere>
      <a-sky src="#background"></a-sky>
    </a-scene>
  </body>
</html>
